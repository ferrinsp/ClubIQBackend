services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clubiq
      POSTGRES_USER: clubiq
      POSTGRES_PASSWORD: clubiq_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clubiq"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
